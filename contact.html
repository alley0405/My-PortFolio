<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Yuvraj Singh</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style1.css">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Page specific overrides or local styles */
    #bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.15), transparent 40%),
        radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px;
    }

    .form-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 3rem;
      border-radius: 24px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-premium);
      backdrop-filter: var(--glass-blur);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-main);
      font-weight: 600;
    }

    .form-control {
      width: 100%;
      padding: 1rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-family: inherit;
      transition: var(--transition-smooth);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 15px var(--primary-glow);
    }
  </style>
</head>

<body>
  <!-- BACKGROUND -->
  <div id="bg"></div>
  <div class="blob-container">
    <div class="blob"></div>
    <div class="blob secondary"></div>
  </div>

  <!-- TOP NAVBAR (Apple Dock Style) -->
  <nav class="NavBar">
    <ul>
      <li>
        <a href="pport.html">
          <i data-lucide="home"></i>
          <span class="label">Home</span>
        </a>
      </li>
      <li>
        <a href="pport.html#skills-section">
          <i data-lucide="zap"></i>
          <span class="label">Skills</span>
        </a>
      </li>
      <li>
        <a href="achievements.html">
          <i data-lucide="award"></i>
          <span class="label">Achievements</span>
        </a>
      </li>
      <li>
        <a href="projects.html">
          <i data-lucide="briefcase"></i>
          <span class="label">Projects</span>
        </a>
      </li>
      <li>
        <a href="contact.html" class="active">
          <i data-lucide="mail"></i>
          <span class="label">Contact</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container">
    <section class="section-padding fade-in-up" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
      <div style="text-align: center; margin-bottom: 3rem; margin-top: 4rem;">
        <h1 class="text-gradient" style="font-size: 3.5rem; font-weight: 800; margin-bottom: 1rem;">Let's Connect</h1>
        <p class="text-muted" style="font-size: 1.2rem; max-width: 500px; margin: 0 auto;">Book an appointment or send me a message to discuss your next big project.</p>
      </div>

      <div class="form-container" style="width: 100%;">
        <form action="#" method="POST" onsubmit="submitForm(event)">
          <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="date">Appointment Date</label>
            <input type="date" id="date" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="time">Preferred Time</label>
            <input type="time" id="time" class="form-control" required>
          </div>
          <div class="form-group" style="margin-bottom: 2rem;">
            <label class="form-label" for="message">Project Details</label>
            <textarea id="message" class="form-control" rows="4" placeholder="Tell me about your project..." required></textarea>
          </div>
          <button type="submit" class="btn-premium" style="width: 100%; border-radius: 12px;">Submit Request</button>
        </form>
        <div id="success-message" style="display: none; text-align: center; margin-top: 1.5rem; color: #10b981; font-weight: 600; font-size: 1.1rem;">
          ✓ Request sent successfully! I will get back to you soon.
        </div>
      </div>
    </section>
  </main>

  <script>
    const nav = document.querySelector('.NavBar');

    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      document.getElementById('bg').style.backgroundPosition = `center, center, 0px ${y * 0.5}px`;

      if (y > 50) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });

    function submitForm(event) {
      event.preventDefault();
      // Simulate form submission
      const btn = event.target.querySelector('button');
      btn.innerText = 'Sending...';
      btn.style.opacity = '0.7';
      
      setTimeout(() => {
        event.target.style.display = 'none';
        document.getElementById('success-message').style.display = 'block';
      }, 1500);
    }
    
    // Initialize Lucide icons
    lucide.createIcons();

    // Navbar dock effect
    const initDock = () => {
      const navBar = document.querySelector('.NavBar');
      const dockItems = document.querySelectorAll('.NavBar a');
      const BASE_SIZE = 44; 
      const MAX_SIZE = 65;
      const DISTANCE_THRESHOLD = 150;

      if (navBar) {
        window.addEventListener('mousemove', (e) => {
          const navRect = navBar.getBoundingClientRect();
          if (e.clientY > navRect.top - 100 && e.clientY < navRect.bottom + 100) {
            dockItems.forEach((item) => {
              const rect = item.getBoundingClientRect();
              const itemCenterX = rect.left + rect.width / 2;
              const distance = Math.abs(e.clientX - itemCenterX);
              let newWidth = BASE_SIZE;
              if (distance < DISTANCE_THRESHOLD) {
                const scale = 1 - (distance / DISTANCE_THRESHOLD);
                newWidth = BASE_SIZE + (MAX_SIZE - BASE_SIZE) * Math.sin(scale * Math.PI / 2);
              }
              item.style.width = `${newWidth}px`;
              item.style.height = `${newWidth}px`;
            });
          } else {
            dockItems.forEach(i => { i.style.width = `${BASE_SIZE}px`; i.style.height = `${BASE_SIZE}px`; });
          }
        });
        navBar.addEventListener('mouseleave', () => {
          dockItems.forEach(i => { i.style.width = `${BASE_SIZE}px`; i.style.height = `${BASE_SIZE}px`; });
        });
      }
    };
    initDock();
  </script>
</body>
</html>
